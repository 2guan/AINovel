services:
  # -------------------------------------------------------------
  # 1. 向量数据库服务 (Qdrant - 用于 RAG 知识库检索)
  # -------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: ai-novel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  # -------------------------------------------------------------
  # 2. 后端 API 服务 (使用原生极简 SQLite 模式)
  # -------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ai-novel-api
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "4001:3000"
    depends_on:
      - qdrant
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ALLOW_LAN=true
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      
      # 极简零维护本地数据库 SQLite 配置
      - AI_NOVEL_DATABASE_MODE=sqlite
      - DATABASE_URL=file:/app/storage/ai_novel.db
      
      # RAG & 向量数据库配置
      - RAG_ENABLED=true
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-gemini-embedding-2}
      
      # LLM 密钥传递 (从 .env 中读取)
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemma-4-31b-it}
      
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - GLM_API_KEY=${GLM_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      
      # 图像存储
      - IMAGE_STORAGE_DRIVER=local
      - IMAGE_STORAGE_ROOT=storage/generated-images
    volumes:
      - ./storage:/app/storage
    # 启动命令：在启动时动态为 SQLite 生成一次 Prisma Client，运行 SQLite 自动迁移，直接运行编译后的 JS 种子文件完成数据注入，然后启动服务
    command: >
      sh -c "/app/node_modules/.bin/prisma generate --config /app/server/prisma.config.ts && /app/node_modules/.bin/prisma migrate deploy && node /app/server/dist/db/seed.js && node ./server/dist/app.js"

  # -------------------------------------------------------------
  # 3. 前端 Web 服务 (Vite + Nginx)
  # -------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    container_name: ai-novel-web
    restart: unless-stopped
    ports:
      - "4002:8080"
    depends_on:
      - api
